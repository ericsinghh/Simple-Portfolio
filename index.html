<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eric - Developer Portfolio</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
    margin: 0;
    padding: 0;
}

body {
    background-color: rgb(0, 0, 33);
    color: white;

    .poppins-regular {
        font-family: "Poppins", sans-serif;
        font-weight: 400;
        font-style: normal;

    }

}

nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 80px;
    background-color: rgb(18, 18, 95);
    ;
}

nav ul {
    display: flex;
    justify-content: center;
}
nav ul {
    list-style: none;
    margin: 0 23px;
}
nav ul li a{
    text-decoration: none;
    color: white
}

nav ul li a:hover{
    color: rgb(153, 153, 219);
    font-size: 1.01rem;
}

main hr{
  border: 0;
  background: #9c97f1;
  height: 1.2px;
  margin: 60px 84px;
}

.left {
    font-size: 1.5rem;
}

.firstSection {
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin: 130px 0;
}

.firstSection > div{
    width: 30%;
}     

.leftsection{
    font-size: 3rem;
    margin: 70px 0;
}

.rightSection img{
    width: 80%;
}

.purple {
    color: rgb(157, 104, 206);
}
 .text-gray{
  color: gray; 
}
   #element {
    color: rgb(157, 104, 206);
   }
    .secoundSection {
        margin: 80vw;
        margin: auto;
    }

    .secoundSection h1{
      font-size: 1.9rem;
    }
    </style>
  </head>

  <body>
    <header>
      <nav>
        <div class="left">Eric's Portfolio</div>
        <div class="right">
          <ul>
            <li><a href="/"></a>Home</a></li>
            <li><a href="/"></a>About</a></li>
            <li><a href="/"></a>Services</a></li>
            <li><a href="/"></a>Contact Me</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main>
      <section class="firstsection">
        <div class="leftSection">
          Hi, My name is <span class="purple">Eric</span>

          <div>and I am a passionate</div>
          <span id="element"></span> 
        </div>
        <div class="rightsection">
            <img src="bg.png" alt="">
      </div>
      </section>
      <hr>
      <section class="secondSection">
        <span class="text-gray">What I have done so far</span>
        <h1>Work Experience</h1>
      
        <div class="box"></div>
      </section>
    </main>

    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>
    <!-- setup and start the typing animation -->
    <script>
      var typed = new typed('#element', {
        Strings: ['Web Developer', 'Video Editor', 'Graphic Designer'],  
        typeSpeed: 50,
      }); 
    </script>
  </body>

</html>
